  nix-flake-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.1
    - uses: nixbuild/nix-quick-install-action@v25
    - name: Build version
      run: nix build --version
    - name: Flake info
      run: nix flake info
    - name: Flake check 
      run: nix flake check
    - name: Flake info
      run: nix flake info
    - name: Flake metadata
      run: nix flake metadata
    - name: Flake show
      run: nix flake show
