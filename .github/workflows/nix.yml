name: Verify nix environment

on:
  # On any push or PR
  push:
  pull_request:
  

jobs:
  nix-dev-shell:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.1
    - uses: nixbuild/nix-quick-install-action@v25
    - run: nix build --version
    - run: rustlings --version && echo OK || echo KO # do not stop the workflow
                                                     # if we get an error
    - run: nix build .#rustlings-app
    - run: rustlings --version && echo OK || echo KO # do not stop the workflow
                                                     # if we get an error

  nix-build-and-run-rustlings:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.1
    - uses: nixbuild/nix-quick-install-action@v25
    - run: nix build --version
    - run: rustlings --version && echo OK || echo KO # do not stop the workflow
                                                     # if we get an error
    - name: Build & Run
      run: nix run .#rustlings -- --help
    - run: rustlings --version && echo OK || echo KO # do not stop the workflow
                                                     # if we get an error
 
